<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação Técnica Express</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-red: #ff003c;
            --neon-blue: #00f3ff;
            --dark-bg: #0a0a0c;
        }

        * { box-sizing: border-box; transition: 0.3s; }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 60, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 243, 255, 0.05) 0%, transparent 40%);
        }

        .main-card {
            background: rgba(20, 20, 25, 0.95);
            width: 100%;
            max-width: 480px;
            padding: 35px;
            border-radius: 15px;
            border: 1px solid rgba(255, 0, 60, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 10px rgba(255, 0, 60, 0.1);
            position: relative;
            overflow: hidden;
        }

        .main-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--neon-red), var(--neon-blue));
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--neon-blue);
            text-align: center;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        .subtitle {
            display: block;
            text-align: center;
            color: #777;
            font-size: 0.85rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .label-tech {
            color: var(--neon-red);
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
        }

        .form-group { margin-bottom: 22px; }

        input[type="text"], textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #222;
            padding: 14px;
            color: #fff;
            font-size: 1rem;
            border-radius: 8px;
            border-left: 3px solid var(--neon-blue);
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--neon-red);
            background: rgba(255, 0, 60, 0.02);
        }

        .grid-check {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .check-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #222;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .check-box:hover { border-color: var(--neon-blue); background: rgba(0, 243, 255, 0.05); }

        .check-box input {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: var(--neon-red);
        }

        .btn-submit {
            width: 100%;
            padding: 20px;
            background: var(--neon-red);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.3);
        }

        .btn-submit:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.5);
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
        }

        /* Efeito de carregamento simples */
        #loading {
            display: none;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            font-size: 0.8rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="main-card">
    <h1>AVALIAÇÃO TECH</h1>
    <span class="subtitle">Venda seu aparelho em poucos segundos</span>

    <form id="vendaForm">
        <div class="form-group">
            <span class="label-tech"><i class="fas fa-terminal"></i> 01. Identificação</span>
            <input type="text" id="nome" placeholder="Como devemos te chamar?" required>
        </div>

        <div class="form-group">
            <span class="label-tech"><i class="fas fa-microchip"></i> 02. Equipamento</span>
            <input type="text" id="aparelho" placeholder="Ex: iPhone 12, S21, Redmi..." required>
        </div>

        <div class="form-group">
            <span class="label-tech"><i class="fas fa-search-plus"></i> 03. Defeitos Visíveis</span>
            <div class="grid-check">
                <label class="check-box"><input type="checkbox" class="defeito" value="Tela Quebrada"> Tela Quebrada</label>
                <label class="check-box"><input type="checkbox" class="defeito" value="Bateria Ruim"> Bateria Ruim</label>
                <label class="check-box"><input type="checkbox" class="defeito" value="Não Carrega"> Não Carrega</label>
                <label class="check-box"><input type="checkbox" class="defeito" value="Câmeras"> Câmeras</label>
                <label class="check-box"><input type="checkbox" class="defeito" value="Botões"> Botões</label>
                <label class="check-box"><input type="checkbox" class="defeito" value="Vidro Traseiro"> Vidro Traseiro</label>
            </div>
        </div>

        <div class="form-group">
            <label class="check-box" style="width: 100%; border: 1px dashed var(--neon-blue);">
                <input type="checkbox" id="liga"> <b>O aparelho ainda dá sinal de vida?</b>
            </label>
        </div>

        <div class="form-group">
            <span class="label-tech"><i class="fas fa-edit"></i> 04. Notas Adicionais</span>
            <textarea id="obs" rows="2" placeholder="Ex: Tem caixa? Nota fiscal? Algum detalhe extra?"></textarea>
        </div>

        <button type="button" class="btn-submit" onclick="processar()">
            GERAR PROPOSTA <i class="fab fa-whatsapp"></i>
        </button>
        <div id="loading">PROCESSANDO DADOS...</div>
    </form>

    <footer>CAJAMAR // SP // SISTEMA_V1</footer>
</div>

<script>
    function processar() {
        const btn = document.querySelector('.btn-submit');
        const load = document.getElementById('loading');
        
        if(!document.getElementById('nome').value || !document.getElementById('aparelho').value) {
            alert("Preencha o nome e o modelo do aparelho!");
            return;
        }

        btn.style.display = 'none';
        load.style.display = 'block';

        setTimeout(() => {
            enviarWhatsApp();
            btn.style.display = 'flex';
            load.style.display = 'none';
        }, 1500);
    }

    function enviarWhatsApp() {
        const nome = document.getElementById('nome').value;
        const aparelho = document.getElementById('aparelho').value.toUpperCase();
        const liga = document.getElementById('liga').checked ? "✅ SIM (LIGA/VIBRA)" : "❌ NÃO LIGA";
        const obs = document.getElementById('obs').value || "NENHUMA";

        let defeitos = [];
        document.querySelectorAll('.defeito:checked').forEach((item) => {
            defeitos.push("🔸 " + item.value);
        });

        const listaDefeitos = defeitos.length > 0 ? defeitos.join("%0A") : "✅ NENHUM SELECIONADO";

        const meuWhats = "5511952483521";
        
        // Mensagem ultra organizada e impactante
        const texto = 
            `*🚀 NOVA SOLICITAÇÃO DE AVALIAÇÃO*%0A` +
            `━━━━━━━━━━━━━━━━━━━━━━━%0A%0A` +
            `👤 *CLIENTE:*%0A` +
            `${nome}%0A%0A` +
            `📱 *EQUIPAMENTO:*%0A` +
            `*Modelo:* ${aparelho}%0A` +
            `*Estado:* ${liga}%0A%0A` +
            `🛠️ *LISTA DE DEFEITOS:*%0A` +
            `${listaDefeitos}%0A%0A` +
            `📝 *NOTAS DO TÉCNICO:*%0A` +
            `_${obs}_%0A%0A` +
            `━━━━━━━━━━━━━━━━━━━━━━━%0A` +
            `*SISTEMA DE AVALIAÇÃO AUTOMÁTICA*`;

        window.open(`https://wa.me/${meuWhats}?text=${texto}`, '_blank');
    }
</script>

</body>
</html>
