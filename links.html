<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REBOOT TECH - Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --neon-red: #ff003c;
            --neon-blue: #00f3ff;
            --dark-bg: #08090a;
        }

        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 50% 50%, #1a0000 0%, #08090a 100%);
        }

        .links-container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .profile-wrapper {
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--neon-red);
            object-fit: cover;
            box-shadow: 0 0 25px rgba(255, 0, 60, 0.6);
            background: #111;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            margin: 0;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .location {
            font-size: 0.8rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 35px;
            display: block;
            font-weight: bold;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20, 20, 25, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px 25px;
            margin-bottom: 15px;
            border-radius: 8px;
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-left: 4px solid var(--neon-red);
        }

        .link-card:hover {
            transform: scale(1.04);
            border-color: var(--neon-blue);
            background: rgba(0, 243, 255, 0.05);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.3);
        }

        .link-card i {
            font-size: 1.1rem;
            color: var(--neon-blue);
        }

        .insta-link {
            border-left-color: #e1306c;
            margin-top: 15px;
        }

        .insta-link i { color: #f77737; }

        footer {
            margin-top: 40px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="links-container">
    <div class="profile-wrapper">
        <img src="Logo.png" alt="REBOOT TECH Logo" class="profile-img">
    </div>
    
    <h1>REBOOT TECH</h1>
    <span class="location"><i class="fas fa-location-dot"></i> Cajamar - SP</span>

    <a href="index.html" class="link-card">
        <span>💰 Venda seu Celular</span>
        <i class="fas fa-chevron-right"></i>
    </a>

    <a href="https://wa.me/5511952483521?text=Olá! Gostaria de um orçamento para *Troca de Tela*." class="link-card">
        <span>📱 Trocar Tela</span>
        <i class="fas fa-chevron-right"></i>
    </a>

    <a href="https://wa.me/5511952483521?text=Olá! Gostaria de um orçamento para *Troca de Bateria*." class="link-card">
        <span>🔋 Trocar Bateria</span>
        <i class="fas fa-chevron-right"></i>
    </a>

    <a href="https://wa.me/5511952483521?text=Olá! Gostaria de um orçamento para *Outros Reparos*." class="link-card">
        <span>🛠️ Outros Reparos</span>
        <i class="fas fa-chevron-right"></i>
    </a>

    <a href="#" class="link-card insta-link">
        <span>📸 Siga no Instagram</span>
        <i class="fab fa-instagram"></i>
    </a>

    <footer>TECNOLOGIA REGENERATIVA // 2026</footer>
</div>

</body>
</html>
